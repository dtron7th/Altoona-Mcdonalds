    <!-- --Book_Mark - (Dev Settings Panel)--------------------- -->
    <div class="Dev_Settings">
        <div class="Buttons">
            <button id="Dev_Settings_Lables">LAB</button>
            <button id="Dev_Settings_Border">BOR</button>
        </div>
        <style aria-label="Dev_Settings_Style">
            .Dev_Settings {
                position: absolute;
                right: 10px;
                top: 10px;
                width: 30px;
                height: 55px;
                background: rgb(0, 0, 0);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .Dev_Settings .Buttons {
                display: flex;
                flex-direction: column;
                gap: 5px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .Dev_Settings .Buttons button {
                width: 20px;
                height: 20px;
                background: rgb(0, 119, 255);
                outline: none;
                border: none;
                font-size: 8px;
                color: rgb(255, 255, 255);
            }
        </style>
        <script aria-label="Dev_Settings_Script">

            const devSettings = document.querySelector('.Dev_Settings');
            let isDragging = false;
            let offsetX, offsetY;

            devSettings.addEventListener('mousedown', function(e) {
                isDragging = true;
                offsetX = e.clientX - devSettings.offsetLeft;
                offsetY = e.clientY - devSettings.offsetTop;
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.clientX - offsetX) + 'px';
                    devSettings.style.top = (e.clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
            });

            devSettings.addEventListener('touchstart', function(e) {
                isDragging = true;
                offsetX = e.touches[0].clientX - devSettings.offsetLeft;
                offsetY = e.touches[0].clientY - devSettings.offsetTop;
            });

            document.addEventListener('touchmove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.touches[0].clientX - offsetX) + 'px';
                    devSettings.style.top = (e.touches[0].clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('touchend', function() {
                isDragging = false;
            });
            
        
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Lables').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-labels-style';
                    const existingStyle = document.getElementById('dev-labels-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '*::before { display: flex !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
            
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Border').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-border-style';
                    const existingStyle = document.getElementById('dev-border-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '* { border: 1px solid red !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
        </script>
    </div>
</head>

        <div class="Support_Buttons">
            <button id="Support_Button">Support</button>
            <button id="Un_Support_Button">Un Support</button>
            <style aria-label="Support_Buttons_Style">
                .Support_Buttons {
                    position: absolute;
                    top: 350px;
                    width: 300px;
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                    justify-content: center;
                    gap: 20px;
                }
                
                .Support_Buttons button {
                    width: 100%;
                    height: 30px;
                    outline: none;
                    background: none;
                    border: 1px solid rgb(0, 0, 0);
                    font-size: 12px;
                    cursor: pointer;
                }
            </style>
            <script aria-label="Support_Buttons_Script">
                document.addEventListener('DOMContentLoaded', function() {
                    const supportButton = document.getElementById('Support_Button');
                    const unSupportButton = document.getElementById('Un_Support_Button');
                    const statsInSupport = document.getElementById('Stats_In_Support');
                    const statsViewSupportsWindow = document.querySelector('.Stats_View_Supports_Window');
                    const statsDatabaseSupportsList = document.querySelector('.Stats_Database_Supports_List');
                    const statsViewSupportsWindowCloseButton = document.getElementById('Stats_View_Supports_Window_Close_Button');

                    const supportDbConfig = {
                        name: 'MCD_Game_Club_Support_DB',
                        version: 1,
                        storeName: 'supports'
                    };

                    const supportDeviceIdStorageKey = 'mcd_game_club_support_device_id';

                    function getSupportDeviceId() {
                        let deviceId = localStorage.getItem(supportDeviceIdStorageKey);
                        if (deviceId) {
                            return deviceId;
                        }

                        deviceId = 'device-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
                        localStorage.setItem(supportDeviceIdStorageKey, deviceId);
                        return deviceId;
                    }

                    const supportDeviceId = getSupportDeviceId();

                    let supportDbPromise;

                    function openSupportDb() {
                        if (supportDbPromise) {
                            return supportDbPromise;
                        }

                        supportDbPromise = new Promise(function(resolve, reject) {
                            const request = indexedDB.open(supportDbConfig.name, supportDbConfig.version);

                            request.onupgradeneeded = function(event) {
                                const db = event.target.result;
                                if (!db.objectStoreNames.contains(supportDbConfig.storeName)) {
                                    db.createObjectStore(supportDbConfig.storeName, {
                                        keyPath: 'id',
                                        autoIncrement: true
                                    });
                                }
                            };

                            request.onsuccess = function() {
                                resolve(request.result);
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });

                        return supportDbPromise;
                    }

                    async function getSupportRecordForDevice() {
                        const records = await getAllSupports();
                        return records.find(function(record) {
                            return record.deviceId === supportDeviceId;
                        }) || null;
                    }

                    async function addSupport() {
                        const existingRecord = await getSupportRecordForDevice();
                        if (existingRecord) {
                            return false;
                        }

                        const db = await openSupportDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(supportDbConfig.storeName, 'readwrite');
                            const store = transaction.objectStore(supportDbConfig.storeName);
                            const request = store.add({
                                deviceId: supportDeviceId,
                                createdAt: new Date().toISOString()
                            });

                            request.onsuccess = function() {
                                resolve(true);
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });
                    }

                    async function removeSupport() {
                        const existingRecord = await getSupportRecordForDevice();
                        if (!existingRecord) {
                            return false;
                        }

                        const db = await openSupportDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(supportDbConfig.storeName, 'readwrite');
                            const store = transaction.objectStore(supportDbConfig.storeName);
                            const deleteRequest = store.delete(existingRecord.id);

                            deleteRequest.onsuccess = function() {
                                resolve(true);
                            };

                            deleteRequest.onerror = function() {
                                reject(deleteRequest.error);
                            };
                        });
                    }

                    async function getSupportCount() {
                        const db = await openSupportDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(supportDbConfig.storeName, 'readonly');
                            const store = transaction.objectStore(supportDbConfig.storeName);
                            const request = store.count();

                            request.onsuccess = function() {
                                resolve(request.result || 0);
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });
                    }

                    async function getAllSupports() {
                        const db = await openSupportDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(supportDbConfig.storeName, 'readonly');
                            const store = transaction.objectStore(supportDbConfig.storeName);
                            const request = store.getAll();

                            request.onsuccess = function() {
                                resolve(request.result || []);
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });
                    }

                    async function renderSupportTrackingList() {
                        if (!statsDatabaseSupportsList) {
                            return;
                        }

                        try {
                            const records = await getAllSupports();
                            statsDatabaseSupportsList.innerHTML = '';

                            if (!records.length) {
                                statsDatabaseSupportsList.innerHTML = '<div style="color: #666; font-size: 12px;">No supports yet</div>';
                                return;
                            }

                            const wrapper = document.createElement('div');
                            wrapper.style.display = 'flex';
                            wrapper.style.flexDirection = 'column';
                            wrapper.style.gap = '8px';
                            wrapper.style.width = '200px';

                            records
                                .slice()
                                .reverse()
                                .forEach(function(record, index) {
                                    const row = document.createElement('div');
                                    
                                    row.style.padding = '6px 8px';
                                    row.style.fontSize = '12px';
                                    row.style.display = 'flex';
                                    row.style.justifyContent = 'space-between';
                                    row.style.gap = '8px';

                                    const label = document.createElement('span');
                                    label.textContent = 'Support #' + (records.length - index);

                                    const timestamp = document.createElement('span');
                                    timestamp.textContent = new Date(record.createdAt).toLocaleString();

                                    row.appendChild(label);
                                    row.appendChild(timestamp);
                                    wrapper.appendChild(row);
                                });

                            statsDatabaseSupportsList.appendChild(wrapper);
                        } catch (error) {
                            console.error('Unable to load support tracking list.', error);
                            statsDatabaseSupportsList.innerHTML = '<div style="color: red; font-size: 12px;">Error loading supports</div>';
                        }
                    }

                    async function refreshSupportCount() {
                        try {
                            const count = await getSupportCount();
                            const hasDeviceSupport = !!(await getSupportRecordForDevice());
                            statsInSupport.dataset.count = String(count);
                            statsInSupport.innerHTML = 'In support<br>' + count;
                            supportButton.disabled = hasDeviceSupport;
                            unSupportButton.disabled = !hasDeviceSupport;
                        } catch (error) {
                            console.error('Unable to load support count.', error);
                        }
                    }

                    supportButton.addEventListener('click', async function() {
                        try {
                            await addSupport();
                            await refreshSupportCount();
                            await renderSupportTrackingList();
                        } catch (error) {
                            console.error('Unable to add support.', error);
                        }
                    });

                    unSupportButton.addEventListener('click', async function() {
                        try {
                            await removeSupport();
                            await refreshSupportCount();
                            await renderSupportTrackingList();
                        } catch (error) {
                            console.error('Unable to remove support.', error);
                        }
                    });

                    statsInSupport.addEventListener('click', async function() {
                        if (statsViewSupportsWindow) {
                            statsViewSupportsWindow.style.display = 'flex';
                        }
                        document.querySelector('.Windows').style.display = 'flex';
                        await renderSupportTrackingList();
                    });

                    if (statsViewSupportsWindowCloseButton) {
                        statsViewSupportsWindowCloseButton.addEventListener('click', function() {
                            if (statsViewSupportsWindow) {
                                statsViewSupportsWindow.style.display = 'none';
                            }
                            document.querySelector('.Windows').style.display = 'none';
                        });
                    }

                    refreshSupportCount();
                    renderSupportTrackingList();
                });
            </script>

            <!-- --Book_Mark - (Signature Modal Window)--------------------- -->
            <div class="Signiture_Window">
                <canvas id="Signiture_Canvas" width="350" height="150"></canvas>
                <div class="Buttons">
                    <button class="Signiture_Submit_Button">[ Submit ]</button>
                    <button class="Signiture_Clear_Button">[ Clear ]</button>
                    <button class="Signiture_Close_Button">[ Close ]</button>
                </div>
                <style aria-label="Signiture_Window_Style">
                    .Signiture_Window {
                        position: relative;
                        width: 350px;
                        height: 150px;
                        background-color: rgb(255, 255, 255);
                        border: 1px solid rgb(0, 0, 0);

                    }

                <!-- --Book_Mark - (Signature Canvas Drawing & IndexedDB)--------------------- -->
                <script aria-label="Signiture_Window_Script">
                    const signitureWindow = document.querySelector('.Signiture_Window');
                    const windowsOverlay = document.querySelector('.Windows');
                    const signitureCanvas = document.getElementById('Signiture_Canvas');
                    const signitureContext = signitureCanvas.getContext('2d');

                    const signitureSubmitButton = document.querySelector('.Signiture_Submit_Button');
                    const signitureClearButton = document.querySelector('.Signiture_Clear_Button');
                    const signitureCounter = document.querySelector('.Stats #Stats_Signitures');
                    const Stats_Signitures = document.getElementById('Stats_Signitures');

                    let isDrawing = false;
                    let hasSignitureStroke = false;

                    const signitureDbConfig = {
                        name: 'MCD_Game_Club_DB',
                        version: 1,
                        storeName: 'signitures'
                    };

                    let signitureDbPromise;

                    function openSignitureDb() {
                        if (signitureDbPromise) {
                            return signitureDbPromise;
                        }

                        signitureDbPromise = new Promise(function(resolve, reject) {
                            const request = indexedDB.open(signitureDbConfig.name);

                            request.onupgradeneeded = function(event) {
                                const db = event.target.result;
                                if (!db.objectStoreNames.contains(signitureDbConfig.storeName)) {
                                    db.createObjectStore(signitureDbConfig.storeName, {
                                        keyPath: 'id',
                                        autoIncrement: true
                                    });
                                }
                            };

                            request.onsuccess = function() {
                                resolve(request.result);
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });

                        return signitureDbPromise;
                    }

                    async function addSignitureToDb(imageDataUrl) {
                        const db = await openSignitureDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(signitureDbConfig.storeName, 'readwrite');
                            const store = transaction.objectStore(signitureDbConfig.storeName);
                            const request = store.add({
                                imageDataUrl: imageDataUrl,
                                createdAt: new Date().toISOString()
                            });

                            request.onsuccess = function() {
                                resolve();
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });
                    }

                    async function getSignitureCountFromDb() {
                        const db = await openSignitureDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(signitureDbConfig.storeName, 'readonly');
                            const store = transaction.objectStore(signitureDbConfig.storeName);
                            const countRequest = store.count();

                            countRequest.onsuccess = function() {
                                resolve(countRequest.result || 0);
                            };

                            countRequest.onerror = function() {
                                reject(countRequest.error);
                            };
                        });
                    }

                    async function refreshSignitureCounterFromDb() {
                        try {
                            const count = await getSignitureCountFromDb();
                            signitureCounter.dataset.count = String(count);
                            signitureCounter.innerHTML = 'Signitures<br>' + count;
                            Stats_Signitures.dataset.count = String(count);
                            Stats_Signitures.innerHTML = 'Signitures<br>' + count;
                        } catch (error) {
                            console.error('Unable to load signitures from database.', error);
                        }
                    }

                    function closeSignitureWindow() {
                        signitureWindow.style.display = 'none';
                        windowsOverlay.style.display = 'none';
                    }

                    function clearSignitureCanvas() {
                        signitureContext.clearRect(0, 0, signitureCanvas.width, signitureCanvas.height);
                        hasSignitureStroke = false;
                    }

                    function getCanvasPoint(event) {
                        const rect = signitureCanvas.getBoundingClientRect();
                        const scaleX = signitureCanvas.width / rect.width;
                        const scaleY = signitureCanvas.height / rect.height;

                        return {
                            x: (event.clientX - rect.left) * scaleX,
                            y: (event.clientY - rect.top) * scaleY
                        };
                    }

                    signitureContext.lineWidth = 1;
                    signitureContext.lineCap = 'round';
                    signitureContext.lineJoin = 'round';
                    signitureContext.strokeStyle = 'rgb(0, 0, 0)';

                    signitureCanvas.addEventListener('pointerdown', function(event) {
                        event.preventDefault();
                        const point = getCanvasPoint(event);
                        isDrawing = true;
                        signitureCanvas.setPointerCapture(event.pointerId);
                        signitureContext.beginPath();
                        signitureContext.moveTo(point.x, point.y);
                    });

                    signitureCanvas.addEventListener('pointermove', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        event.preventDefault();
                        const point = getCanvasPoint(event);
                        signitureContext.lineTo(point.x, point.y);
                        signitureContext.stroke();
                        hasSignitureStroke = true;
                    });

                    signitureCanvas.addEventListener('pointerup', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        event.preventDefault();
                        isDrawing = false;
                        signitureCanvas.releasePointerCapture(event.pointerId);
                        signitureContext.closePath();
                    });

                    signitureCanvas.addEventListener('pointercancel', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        isDrawing = false;
                        signitureCanvas.releasePointerCapture(event.pointerId);
                        signitureContext.closePath();
                    });

                    signitureClearButton.addEventListener('click', function() {
                        clearSignitureCanvas();
                    });

                    signitureSubmitButton.addEventListener('click', async function() {
                        if (!hasSignitureStroke) {
                            return;
                        }

                        const signitureImageData = signitureCanvas.toDataURL('image/png');

                        try {
                            await addSignitureToDb(signitureImageData);
                            await refreshSignitureCounterFromDb();
                        } catch (error) {
                            console.error('Unable to save signiture.', error);
                            return;
                        }

                        closeSignitureWindow();
                        clearSignitureCanvas();
                    });

                    document.querySelector('.Signiture_Close_Button').addEventListener('click', function() {
                        closeSignitureWindow();
                    });

                    refreshSignitureCounterFromDb();
                </script>

                            <script aria-label="Database_Signitures_Script">
                                const signaturesContainer = document.querySelector('.Database_Signitures');
                                const signaturesList = document.querySelector('.Database_Signitures_List');
                                const signatureListDbConfig = {
                                    name: 'MCD_Game_Club_DB',
                                    version: 1,
                                    storeName: 'signitures'
                                };

                                let signatureListDbPromise;

                                function openSignatureListDb() {
                                    if (signatureListDbPromise) {
                                        return signatureListDbPromise;
                                    }

                                    signatureListDbPromise = new Promise(function(resolve, reject) {
                                        const request = indexedDB.open(signatureListDbConfig.name);

                                        request.onupgradeneeded = function(event) {
                                            const db = event.target.result;
                                            if (!db.objectStoreNames.contains(signatureListDbConfig.storeName)) {
                                                db.createObjectStore(signatureListDbConfig.storeName, {
                                                    keyPath: 'id',
                                                    autoIncrement: true
                                                });
                                            }
                                        };

                                        request.onsuccess = function() {
                                            resolve(request.result);
                                        };

                                        request.onerror = function() {
                                            reject(request.error);
                                        };
                                    });

                                    return signatureListDbPromise;
                                }

                                async function getAllSignatureRecords() {
                                    const db = await openSignatureListDb();
                                    return new Promise(function(resolve, reject) {
                                        const transaction = db.transaction(signatureListDbConfig.storeName, 'readonly');
                                        const store = transaction.objectStore(signatureListDbConfig.storeName);
                                        const request = store.getAll();

                                        request.onsuccess = function() {
                                            resolve(request.result || []);
                                        };

                                        request.onerror = function() {
                                            reject(request.error);
                                        };
                                    });
                                }

                                async function renderSignaturesColumn() {
                                    try {
                                        const records = await getAllSignatureRecords();
                                        signaturesList.innerHTML = '';

                                        if (!records.length) {
                                            signaturesList.innerHTML = '<div style="color: #666; font-size: 12px;">No signatures</div>';
                                            return;
                                        }

                                        const wrapper = document.createElement('div');
                                        wrapper.style.display = 'flex';
                                        wrapper.style.flexDirection = 'column';
                                        wrapper.style.gap = '10px';
                                        wrapper.style.width = '100%';

                                        records.forEach(function(record) {
                                            const img = document.createElement('img');
                                            img.src = record.imageDataUrl;
                                            img.alt = 'Signature #' + record.id;
                                            img.style.width = '100%';
                                            img.style.maxHeight = '50px';

                                            
                                            
                                            img.style.objectFit = 'contain';
                                            img.style.backgroundColor = '#fff';

                                            wrapper.appendChild(img);
                                        });

                                        signaturesList.appendChild(wrapper);
                                    } catch (error) {
                                        console.error('Failed to load signatures.', error);
                                        signaturesList.innerHTML = '<div style="color: red; font-size: 12px;">Error loading signatures</div>';
                                    }
                                }

                                document.getElementById('Menu_View_Signitures').addEventListener('click', async function() {

                                });
