        <div class="Support_Buttons">
            <button id="Support_Button">Support</button>
            <button id="Un_Support_Button">Un Support</button>
            <style aria-label="Support_Buttons_Style">
                .Support_Buttons {
                    position: absolute;
                    top: 350px;
                    width: 300px;
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                    justify-content: center;
                    gap: 20px;
                }
                
                .Support_Buttons button {
                    width: 100%;
                    height: 30px;
                    outline: none;
                    background: none;
                    border: 1px solid rgb(0, 0, 0);
                    font-size: 12px;
                    cursor: pointer;
                }
            </style>
            <script aria-label="Support_Buttons_Script">
                document.addEventListener('DOMContentLoaded', function() {
                    const supportButton = document.getElementById('Support_Button');
                    const unSupportButton = document.getElementById('Un_Support_Button');
                    const statsInSupport = document.getElementById('Stats_In_Support');
                    const statsViewSupportsWindow = document.querySelector('.Stats_View_Supports_Window');
                    const statsDatabaseSupportsList = document.querySelector('.Stats_Database_Supports_List');
                    const statsViewSupportsWindowCloseButton = document.getElementById('Stats_View_Supports_Window_Close_Button');

                    const supportDeviceIdStorageKey = 'mcd_game_club_support_device_id';

                    function getSupportDeviceId() {
                        let deviceId = localStorage.getItem(supportDeviceIdStorageKey);
                        if (deviceId) {
                            return deviceId;
                        }

                        deviceId = 'device-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
                        localStorage.setItem(supportDeviceIdStorageKey, deviceId);
                        return deviceId;
                    }

                    const supportDeviceId = getSupportDeviceId();

                    async function apiRequest(path, options) {
                        const requestOptions = options || {};
                        const headers = requestOptions.headers || {};

                        const response = await fetch(path, {
                            method: requestOptions.method || 'GET',
                            headers: Object.assign({
                                'Content-Type': 'application/json'
                            }, headers),
                            body: requestOptions.body
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            const error = new Error(errorText || ('Request failed with status ' + response.status));
                            error.status = response.status;
                            throw error;
                        }

                        return response.json();
                    }

                    async function getSupportRecordForDevice() {
                        try {
                            const response = await apiRequest('/api/supports/' + encodeURIComponent(supportDeviceId));
                            return response.record || null;
                        } catch (error) {
                            if (error && error.status === 404) {
                                return null;
                            }
                            throw error;
                        }
                    }

                    async function addSupport() {
                        const response = await apiRequest('/api/supports', {
                            method: 'POST',
                            body: JSON.stringify({
                                deviceId: supportDeviceId
                            })
                        });

                        return !!response.added;
                    }

                    async function removeSupport() {
                        const response = await apiRequest('/api/supports/' + encodeURIComponent(supportDeviceId), {
                            method: 'DELETE'
                        });

                        return !!response.removed;
                    }

                    async function getSupportCount() {
                        const response = await apiRequest('/api/supports/count');
                        return response.count || 0;
                    }

                    async function getAllSupports() {
                        return apiRequest('/api/supports');
                    }

                    async function renderSupportTrackingList() {
                        if (!statsDatabaseSupportsList) {
                            return;
                        }

                        try {
                            const records = await getAllSupports();
                            statsDatabaseSupportsList.innerHTML = '';

                            if (!records.length) {
                                statsDatabaseSupportsList.innerHTML = '<div style="color: #666; font-size: 12px;">No supports yet</div>';
                                return;
                            }

                            const wrapper = document.createElement('div');
                            wrapper.style.display = 'flex';
                            wrapper.style.flexDirection = 'column';
                            wrapper.style.gap = '8px';
                            wrapper.style.width = '200px';

                            records
                                .slice()
                                .reverse()
                                .forEach(function(record, index) {
                                    const row = document.createElement('div');
                                    
                                    row.style.padding = '6px 8px';
                                    row.style.fontSize = '12px';
                                    row.style.display = 'flex';
                                    row.style.justifyContent = 'space-between';
                                    row.style.gap = '8px';

                                    const label = document.createElement('span');
                                    label.textContent = 'Support #' + (records.length - index);

                                    const timestamp = document.createElement('span');
                                    timestamp.textContent = new Date(record.createdAt).toLocaleString();

                                    row.appendChild(label);
                                    row.appendChild(timestamp);
                                    wrapper.appendChild(row);
                                });

                            statsDatabaseSupportsList.appendChild(wrapper);
                        } catch (error) {
                            console.error('Unable to load support tracking list.', error);
                            statsDatabaseSupportsList.innerHTML = '<div style="color: red; font-size: 12px;">Error loading supports</div>';
                        }
                    }

                    async function refreshSupportCount() {
                        try {
                            const count = await getSupportCount();
                            const hasDeviceSupport = !!(await getSupportRecordForDevice());
                            statsInSupport.dataset.count = String(count);
                            statsInSupport.innerHTML = 'In support<br>' + count;
                            supportButton.disabled = hasDeviceSupport;
                            unSupportButton.disabled = !hasDeviceSupport;
                        } catch (error) {
                            console.error('Unable to load support count.', error);
                        }
                    }

                    supportButton.addEventListener('click', async function() {
                        try {
                            await addSupport();
                            await refreshSupportCount();
                            await renderSupportTrackingList();
                        } catch (error) {
                            console.error('Unable to add support.', error);
                        }
                    });

                    unSupportButton.addEventListener('click', async function() {
                        try {
                            await removeSupport();
                            await refreshSupportCount();
                            await renderSupportTrackingList();
                        } catch (error) {
                            console.error('Unable to remove support.', error);
                        }
                    });

                    statsInSupport.addEventListener('click', async function() {
                        if (statsViewSupportsWindow) {
                            statsViewSupportsWindow.style.display = 'flex';
                        }
                        document.querySelector('.Windows').style.display = 'flex';
                        await renderSupportTrackingList();
                    });

                    if (statsViewSupportsWindowCloseButton) {
                        statsViewSupportsWindowCloseButton.addEventListener('click', function() {
                            if (statsViewSupportsWindow) {
                                statsViewSupportsWindow.style.display = 'none';
                            }
                            document.querySelector('.Windows').style.display = 'none';
                        });
                    }

                    const supportLiveRefreshIntervalMs = 3000;
                    let supportLiveRefreshTimer = null;

                    async function refreshSupportUiLive() {
                        await refreshSupportCount();

                        if (statsViewSupportsWindow && statsViewSupportsWindow.style.display === 'flex') {
                            await renderSupportTrackingList();
                        }
                    }

                    function startSupportLiveRefresh() {
                        if (supportLiveRefreshTimer) {
                            return;
                        }

                        supportLiveRefreshTimer = setInterval(function() {
                            refreshSupportUiLive().catch(function(error) {
                                console.error('Support live refresh failed.', error);
                            });
                        }, supportLiveRefreshIntervalMs);
                    }

                    function stopSupportLiveRefresh() {
                        if (!supportLiveRefreshTimer) {
                            return;
                        }

                        clearInterval(supportLiveRefreshTimer);
                        supportLiveRefreshTimer = null;
                    }

                    document.addEventListener('visibilitychange', function() {
                        if (document.hidden) {
                            stopSupportLiveRefresh();
                            return;
                        }

                        refreshSupportUiLive().catch(function(error) {
                            console.error('Support live refresh failed.', error);
                        });
                        startSupportLiveRefresh();
                    });

                    refreshSupportUiLive();
                    startSupportLiveRefresh();
                });
            </script>

        <div class="Bottom_Buttons">
            <button id="Add_Signiture_Button">Add your signiture</button>
            <button id="Donate_Button">Donate to build games</button>
            <style aria-label="Bottom_Buttons_Style">
                .Bottom_Buttons {
                    position: absolute;
                    bottom: 10px;
                    width: calc(100% - 20px);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    gap: 20px;
                }
                
                .Bottom_Buttons button {
                    width: 100%;
                    height: 40px;
                    outline: none;
                    background: none;
                    border: 1px solid rgb(0, 0, 0);
                    font-size: 12px;
                    cursor: pointer;
                }

                .Bottom_Buttons button:disabled {
                    color: rgb(120, 120, 120);
                    background: rgb(235, 235, 235);
                    border-color: rgb(180, 180, 180);
                    cursor: not-allowed;
                }
            </style>
            <script aria-label="Bottom_Buttons_Script">
                const addSignitureButton = document.getElementById('Add_Signiture_Button');
                const signitureDeviceIdStorageKeyForGuard = 'mcd_game_club_signiture_device_id';
                const signitureGuardRefreshIntervalMs = 3000;
                let signitureGuardRefreshTimer = null;

                function getSignitureDeviceIdForGuard() {
                    let deviceId = localStorage.getItem(signitureDeviceIdStorageKeyForGuard);
                    if (deviceId) {
                        return deviceId;
                    }

                    deviceId = 'device-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
                    localStorage.setItem(signitureDeviceIdStorageKeyForGuard, deviceId);
                    return deviceId;
                }

                async function hasSignatureForCurrentDevice() {
                    const deviceId = getSignitureDeviceIdForGuard();
                    const response = await fetch('/api/signatures/device/' + encodeURIComponent(deviceId));

                    if (response.status === 404) {
                        return false;
                    }

                    if (!response.ok) {
                        throw new Error('Failed to check signature status: ' + response.status);
                    }

                    const payload = await response.json();
                    return !!payload.exists;
                }

                async function refreshAddSignitureButtonState() {
                    try {
                        const hasSignature = await hasSignatureForCurrentDevice();
                        addSignitureButton.disabled = hasSignature;
                        addSignitureButton.textContent = hasSignature ? 'Signature already submitted' : 'Add your signiture';
                    } catch (error) {
                        console.error('Unable to check signature guard.', error);
                    }
                }

                window.refreshAddSignitureButtonState = refreshAddSignitureButtonState;

                function startSignitureGuardLiveRefresh() {
                    if (signitureGuardRefreshTimer) {
                        return;
                    }

                    signitureGuardRefreshTimer = setInterval(function() {
                        refreshAddSignitureButtonState();
                    }, signitureGuardRefreshIntervalMs);
                }

                function stopSignitureGuardLiveRefresh() {
                    if (!signitureGuardRefreshTimer) {
                        return;
                    }

                    clearInterval(signitureGuardRefreshTimer);
                    signitureGuardRefreshTimer = null;
                }

                addSignitureButton.addEventListener('click', async function() {
                    await refreshAddSignitureButtonState();

                    if (addSignitureButton.disabled) {
                        return;
                    }

                    document.querySelector('.Signiture_Window').style.display = 'flex';
                    document.querySelector('.Windows').style.display = 'flex';
                });

                document.addEventListener('visibilitychange', function() {
                    if (document.hidden) {
                        stopSignitureGuardLiveRefresh();
                        return;
                    }

                    refreshAddSignitureButtonState();
                    startSignitureGuardLiveRefresh();
                });

                refreshAddSignitureButtonState();
                startSignitureGuardLiveRefresh();
            </script>

        <!-- --Book_Mark - (Windows Overlay & Modal Windows)--------------------- -->
        <div class="Windows">
            <!-- --Book_Mark - (Signature Modal Window)--------------------- -->
            <div class="Signiture_Window">
                <canvas id="Signiture_Canvas" width="350" height="150"></canvas>
                <div class="Buttons">
                    <button class="Signiture_Submit_Button">[ Submit ]</button>
                    <button class="Signiture_Clear_Button">[ Clear ]</button>
                    <button class="Signiture_Close_Button">[ Close ]</button>
                </div>
                <style aria-label="Signiture_Window_Style">
                    .Signiture_Window {
                        position: relative;
                        width: 350px;
                        height: 150px;
                        background-color: rgb(255, 255, 255);
                        border: 1px solid rgb(0, 0, 0);

                    }

                    #Signiture_Canvas {
                        width: 350px;

                        cursor: crosshair;
                    }
                    
                    .Signiture_Window .Buttons {
                        position: absolute;

                    }

                <!-- --Book_Mark - (Signature Canvas Drawing & IndexedDB)--------------------- -->
                <script aria-label="Signiture_Window_Script">
                    const signitureWindow = document.querySelector('.Signiture_Window');
                    const windowsOverlay = document.querySelector('.Windows');
                    const signitureCanvas = document.getElementById('Signiture_Canvas');
                    const signitureContext = signitureCanvas.getContext('2d');

                    const signitureSubmitButton = document.querySelector('.Signiture_Submit_Button');
                    const signitureClearButton = document.querySelector('.Signiture_Clear_Button');
                    const signitureCounter = document.querySelector('.Stats #Stats_Signitures');
                    const Stats_Signitures = document.getElementById('Stats_Signitures');

                    let isDrawing = false;
                    let hasSignitureStroke = false;
                    const signitureLiveRefreshIntervalMs = 3000;
                    let signitureLiveRefreshTimer = null;

                    const signitureDeviceIdStorageKey = 'mcd_game_club_signiture_device_id';

                    function getSignitureDeviceId() {
                        let deviceId = localStorage.getItem(signitureDeviceIdStorageKey);
                        if (deviceId) {
                            return deviceId;
                        }

                        deviceId = 'device-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
                        localStorage.setItem(signitureDeviceIdStorageKey, deviceId);
                        return deviceId;
                    }

                    const signitureDeviceId = getSignitureDeviceId();

                    async function signitureApiRequest(path, options) {
                        const requestOptions = options || {};
                        const headers = requestOptions.headers || {};

                        const response = await fetch(path, {
                            method: requestOptions.method || 'GET',
                            headers: Object.assign({
                                'Content-Type': 'application/json'
                            }, headers),
                            body: requestOptions.body
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            throw new Error(errorText || ('Request failed with status ' + response.status));
                        }

                        return response.json();
                    }

                    async function addSignitureToDb(imageDataUrl) {
                        return signitureApiRequest('/api/signatures', {
                            method: 'POST',
                            body: JSON.stringify({
                                imageDataUrl: imageDataUrl,
                                deviceId: signitureDeviceId
                            })
                        });
                    }

                    async function getSignitureCountFromDb() {
                        const response = await signitureApiRequest('/api/signatures/count');
                        return response.count || 0;
                    }

                    async function getAllSignitures() {
                        return signitureApiRequest('/api/signatures');
                    }

                    async function refreshSignitureCounterFromDb() {
                        try {
                            const count = await getSignitureCountFromDb();
                            signitureCounter.dataset.count = String(count);
                            signitureCounter.innerHTML = 'Signitures<br>' + count;
                            Stats_Signitures.dataset.count = String(count);
                            Stats_Signitures.innerHTML = 'Signitures<br>' + count;
                        } catch (error) {
                            console.error('Unable to load signitures from database.', error);
                        }
                    }

                    async function refreshSignitureUiLive() {
                        await refreshSignitureCounterFromDb();

                        const signaturesWindow = document.querySelector('.View_Signitures_Window');
                        const statsSignituresWindow = document.querySelector('.Stats_View_Signitures_Window');

                        if (signaturesWindow && signaturesWindow.style.display === 'flex' && typeof window.renderSignaturesColumn === 'function') {
                            await window.renderSignaturesColumn();
                        }

                        if (statsSignituresWindow && statsSignituresWindow.style.display === 'flex' && typeof window.renderStatsSignaturesColumn === 'function') {
                            await window.renderStatsSignaturesColumn();
                        }
                    }

                    function startSignitureLiveRefresh() {
                        if (signitureLiveRefreshTimer) {
                            return;
                        }

                        signitureLiveRefreshTimer = setInterval(function() {
                            refreshSignitureUiLive().catch(function(error) {
                                console.error('Signiture live refresh failed.', error);
                            });
                        }, signitureLiveRefreshIntervalMs);
                    }

                    function stopSignitureLiveRefresh() {
                        if (!signitureLiveRefreshTimer) {
                            return;
                        }

                        clearInterval(signitureLiveRefreshTimer);
                        signitureLiveRefreshTimer = null;
                    }

                    document.addEventListener('visibilitychange', function() {
                        if (document.hidden) {
                            stopSignitureLiveRefresh();
                            return;
                        }

                        refreshSignitureUiLive().catch(function(error) {
                            console.error('Signiture live refresh failed.', error);
                        });
                        startSignitureLiveRefresh();
                    });

                    function closeSignitureWindow() {
                        signitureWindow.style.display = 'none';
                        windowsOverlay.style.display = 'none';
                    }

                    function clearSignitureCanvas() {
                        signitureContext.clearRect(0, 0, signitureCanvas.width, signitureCanvas.height);
                        hasSignitureStroke = false;
                    }

                    function getCanvasPoint(event) {
                        const rect = signitureCanvas.getBoundingClientRect();
                        const scaleX = signitureCanvas.width / rect.width;
                        const scaleY = signitureCanvas.height / rect.height;

                        return {
                            x: (event.clientX - rect.left) * scaleX,
                            y: (event.clientY - rect.top) * scaleY
                        };
                    }

                    signitureContext.lineWidth = 1;
                    signitureContext.lineCap = 'round';
                    signitureContext.lineJoin = 'round';
                    signitureContext.strokeStyle = 'rgb(0, 0, 0)';

                    signitureCanvas.addEventListener('pointerdown', function(event) {
                        event.preventDefault();
                        const point = getCanvasPoint(event);
                        isDrawing = true;
                        signitureCanvas.setPointerCapture(event.pointerId);
                        signitureContext.beginPath();
                        signitureContext.moveTo(point.x, point.y);
                    });

                    signitureCanvas.addEventListener('pointermove', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        event.preventDefault();
                        const point = getCanvasPoint(event);
                        signitureContext.lineTo(point.x, point.y);
                        signitureContext.stroke();
                        hasSignitureStroke = true;
                    });

                    signitureCanvas.addEventListener('pointerup', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        event.preventDefault();
                        isDrawing = false;
                        signitureCanvas.releasePointerCapture(event.pointerId);
                        signitureContext.closePath();
                    });

                    signitureCanvas.addEventListener('pointercancel', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        isDrawing = false;
                        signitureCanvas.releasePointerCapture(event.pointerId);
                        signitureContext.closePath();
                    });

                    signitureClearButton.addEventListener('click', function() {
                        clearSignitureCanvas();
                    });

                    signitureSubmitButton.addEventListener('click', async function() {
                        if (!hasSignitureStroke) {
                            return;
                        }

                        const signitureImageData = signitureCanvas.toDataURL('image/png');

                        try {
                            const result = await addSignitureToDb(signitureImageData);

                            if (result && result.added === false) {
                                alert(result.message || 'This device already submitted a signature.');
                                closeSignitureWindow();
                                clearSignitureCanvas();
                                await refreshSignitureCounterFromDb();
                                if (typeof window.refreshAddSignitureButtonState === 'function') {
                                    await window.refreshAddSignitureButtonState();
                                }
                                return;
                            }

                            await refreshSignitureCounterFromDb();
                            if (typeof window.refreshAddSignitureButtonState === 'function') {
                                await window.refreshAddSignitureButtonState();
                            }
                        } catch (error) {
                            console.error('Unable to save signiture.', error);
                            return;
                        }

                        closeSignitureWindow();
                        clearSignitureCanvas();
                    });

                    document.querySelector('.Signiture_Close_Button').addEventListener('click', function() {
                        closeSignitureWindow();
                    });

                    refreshSignitureCounterFromDb();
                    refreshSignitureUiLive();
                    startSignitureLiveRefresh();
                </script>
