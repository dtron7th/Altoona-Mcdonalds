    <div class="Dev_Settings">
        <div class="Buttons">
            <button id="Dev_Settings_Lables">LAB</button>

        <style aria-label="Dev_Settings_Style">
            .Dev_Settings {
                position: absolute;
                right: 10px;
                top: 10px;
                width: 30px;
                height: 55px;
                background: rgb(0, 0, 0);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .Dev_Settings .Buttons {
                display: flex;
                flex-direction: column;
                gap: 5px;

                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .Dev_Settings .Buttons button {
                width: 20px;

                background: rgb(0, 119, 255);
                outline: none;
                border: none;
                font-size: 8px;
                color: rgb(255, 255, 255);

        </style>
        <script aria-label="Dev_Settings_Script">

            const devSettings = document.querySelector('.Dev_Settings');
            let isDragging = false;
            let offsetX, offsetY;

            devSettings.addEventListener('mousedown', function(e) {
                isDragging = true;
                offsetX = e.clientX - devSettings.offsetLeft;
                offsetY = e.clientY - devSettings.offsetTop;
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.clientX - offsetX) + 'px';
                    devSettings.style.top = (e.clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
            });

            devSettings.addEventListener('touchstart', function(e) {
                isDragging = true;
                offsetX = e.touches[0].clientX - devSettings.offsetLeft;
                offsetY = e.touches[0].clientY - devSettings.offsetTop;
            });

            document.addEventListener('touchmove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.touches[0].clientX - offsetX) + 'px';
                    devSettings.style.top = (e.touches[0].clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('touchend', function() {
                isDragging = false;
            });
            
        
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Lables').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-labels-style';
                    const existingStyle = document.getElementById('dev-labels-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '*::before { display: flex !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
            
            document.addEventListener('DOMContentLoaded', function() {

                    const style = document.createElement('style');
                    style.id = 'dev-border-style';
                    const existingStyle = document.getElementById('dev-border-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '* { border: 1px solid red !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
        </script>

                <!-- --Book_Mark - (Signature Canvas Drawing & IndexedDB)--------------------- -->
                <script aria-label="Signiture_Window_Script">
                    const signitureWindow = document.querySelector('.Signiture_Window');
                    const windowsOverlay = document.querySelector('.Windows');
                    const signitureCanvas = document.getElementById('Signiture_Canvas');
                    const signitureContext = signitureCanvas.getContext('2d');

                    const signitureSubmitButton = document.querySelector('.Signiture_Submit_Button');
                    const signitureClearButton = document.querySelector('.Signiture_Clear_Button');
                    const signitureCounter = document.querySelector('.Stats #Signitures');

                    let isDrawing = false;
                    let hasSignitureStroke = false;

                    const signitureDbConfig = {
                        name: 'MCD_Game_Club_DB',
                        version: 1,
                        storeName: 'signitures'
                    };

                    let signitureDbPromise;

                    function openSignitureDb() {
                        if (signitureDbPromise) {
                            return signitureDbPromise;
                        }

                        signitureDbPromise = new Promise(function(resolve, reject) {
                            const request = indexedDB.open(signitureDbConfig.name, signitureDbConfig.version);

                            request.onupgradeneeded = function(event) {
                                const db = event.target.result;
                                if (!db.objectStoreNames.contains(signitureDbConfig.storeName)) {
                                    db.createObjectStore(signitureDbConfig.storeName, {
                                        keyPath: 'id',
                                        autoIncrement: true
                                    });
                                }
                            };

                            request.onsuccess = function() {
                                resolve(request.result);
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });

                        return signitureDbPromise;
                    }

                    async function addSignitureToDb(imageDataUrl) {
                        const db = await openSignitureDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(signitureDbConfig.storeName, 'readwrite');
                            const store = transaction.objectStore(signitureDbConfig.storeName);
                            const request = store.add({
                                imageDataUrl: imageDataUrl,
                                createdAt: new Date().toISOString()
                            });

                            request.onsuccess = function() {
                                resolve();
                            };

                            request.onerror = function() {
                                reject(request.error);
                            };
                        });
                    }

                    async function getSignitureCountFromDb() {
                        const db = await openSignitureDb();

                        return new Promise(function(resolve, reject) {
                            const transaction = db.transaction(signitureDbConfig.storeName, 'readonly');
                            const store = transaction.objectStore(signitureDbConfig.storeName);
                            const countRequest = store.count();

                            countRequest.onsuccess = function() {
                                resolve(countRequest.result || 0);
                            };

                            countRequest.onerror = function() {
                                reject(countRequest.error);
                            };
                        });
                    }

                    async function refreshSignitureCounterFromDb() {
                        try {
                            const count = await getSignitureCountFromDb();
                            signitureCounter.dataset.count = String(count);
                            signitureCounter.innerHTML = 'Signitures<br>' + count;
                        } catch (error) {
                            console.error('Unable to load signitures from database.', error);
                        }
                    }

                    function closeSignitureWindow() {
                        signitureWindow.style.display = 'none';
                        windowsOverlay.style.display = 'none';
                    }

                    function clearSignitureCanvas() {
                        signitureContext.clearRect(0, 0, signitureCanvas.width, signitureCanvas.height);
                        hasSignitureStroke = false;
                    }

                    function getCanvasPoint(event) {
                        const rect = signitureCanvas.getBoundingClientRect();
                        const scaleX = signitureCanvas.width / rect.width;
                        const scaleY = signitureCanvas.height / rect.height;

                        return {
                            x: (event.clientX - rect.left) * scaleX,
                            y: (event.clientY - rect.top) * scaleY
                        };
                    }

                    signitureContext.lineWidth = 1;
                    signitureContext.lineCap = 'round';
                    signitureContext.lineJoin = 'round';
                    signitureContext.strokeStyle = 'rgb(0, 0, 0)';

                    signitureCanvas.addEventListener('pointerdown', function(event) {
                        event.preventDefault();
                        const point = getCanvasPoint(event);
                        isDrawing = true;
                        signitureCanvas.setPointerCapture(event.pointerId);
                        signitureContext.beginPath();
                        signitureContext.moveTo(point.x, point.y);
                    });

                    signitureCanvas.addEventListener('pointermove', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        event.preventDefault();
                        const point = getCanvasPoint(event);
                        signitureContext.lineTo(point.x, point.y);
                        signitureContext.stroke();
                        hasSignitureStroke = true;
                    });

                    signitureCanvas.addEventListener('pointerup', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        event.preventDefault();
                        isDrawing = false;
                        signitureCanvas.releasePointerCapture(event.pointerId);
                        signitureContext.closePath();
                    });

                    signitureCanvas.addEventListener('pointercancel', function(event) {
                        if (!isDrawing) {
                            return;
                        }

                        isDrawing = false;
                        signitureCanvas.releasePointerCapture(event.pointerId);
                        signitureContext.closePath();
                    });

                    signitureClearButton.addEventListener('click', function() {
                        clearSignitureCanvas();
                    });

                    signitureSubmitButton.addEventListener('click', async function() {
                        if (!hasSignitureStroke) {
                            return;
                        }

                        const signitureImageData = signitureCanvas.toDataURL('image/png');

                        try {
                            await addSignitureToDb(signitureImageData);
                            await refreshSignitureCounterFromDb();
                        } catch (error) {
                            console.error('Unable to save signiture.', error);
                            return;
                        }

                        closeSignitureWindow();
                        clearSignitureCanvas();
                    });

                    document.querySelector('.Signiture_Close_Button').addEventListener('click', function() {
                        closeSignitureWindow();
                    });

                    refreshSignitureCounterFromDb();
                </script>
